services:
  api:
    build:
      context: ./backend
    image: nhien-cafe-api:latest
    restart: unless-stopped

    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    networks:
      nhien_network:
      nginx_proxy:
        aliases:
          - nhien-api

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_ADMIN_EMAILS: ${NEXT_PUBLIC_ADMIN_EMAILS:-}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        API_INTERNAL_URL: http://api:8080
    image: nhien-cafe-landing-page:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      API_INTERNAL_URL: http://api:8080
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_ADMIN_EMAILS: ${NEXT_PUBLIC_ADMIN_EMAILS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MENU_IMPORT_MODEL: ${OPENAI_MENU_IMPORT_MODEL:-gpt-5.4-mini}
      CDN_S3_ENDPOINT: ${CDN_S3_ENDPOINT:-}
      CDN_S3_INTERNAL_ENDPOINT: ${CDN_S3_INTERNAL_ENDPOINT:-}
      CDN_S3_BUCKET: ${CDN_S3_BUCKET:-}
      CDN_S3_REGION: ${CDN_S3_REGION:-}
      CDN_S3_ACCESS_KEY: ${CDN_S3_ACCESS_KEY:-}
      CDN_S3_SECRET_KEY: ${CDN_S3_SECRET_KEY:-}
      CDN_S3_FORCE_PATH_STYLE: ${CDN_S3_FORCE_PATH_STYLE:-}
      CDN_PUBLIC_BASE_URL: ${CDN_PUBLIC_BASE_URL:-}
    networks:
      nhien_network:
      nginx_proxy:
        aliases:
          - nhien-web

networks:
  nhien_network:
    driver: bridge
  nginx_proxy:
    external: true
    name: nginx-manager_default
