services:
  api:
    build:
      context: ./backend
    image: nhien-cafe-api:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    networks:
      nhien_network:

networks:
  nhien_network:
    driver: bridge
